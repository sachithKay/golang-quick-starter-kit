version: v2
plugins:
  # 1. Generate the standard Go data structures (Slices, Structs)
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative

  # 2. Generate the gRPC Server/Client code
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false # Helpful for simpler handlers

  # 3. Generate the REST Gateway (The "Bridge")
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt: paths=source_relative